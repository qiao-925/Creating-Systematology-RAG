name: nightshift-execute

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number that holds the plan"
        required: true
      push_ref:
        description: "Branch to execute on"
        required: true
      task:
        description: "Task key from .agent/project.yaml"
        required: true
        default: execute_plan
      time_budget_hours:
        description: "Soft time budget in hours"
        required: true
        default: "6"

jobs:
  execute:
    runs-on: self-hosted
    timeout-minutes: 480
    concurrency:
      group: nightshift-execute-${{ inputs.push_ref }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Persist dispatch context
        shell: bash
        run: |
          mkdir -p .nightshift-dispatch
          jq -n \
            --arg issue_number "${{ inputs.issue_number }}" \
            --arg push_ref "${{ inputs.push_ref }}" \
            --arg task "${{ inputs.task }}" \
            --arg time_budget_hours "${{ inputs.time_budget_hours }}" \
            '{issue_number: $issue_number, push_ref: $push_ref, task: $task, time_budget_hours: $time_budget_hours}' \
            > .nightshift-dispatch/context.json

      - name: Upload dispatch context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightshift-dispatch-context
          path: .nightshift-dispatch/context.json
          if-no-files-found: error

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.push_ref }}

      - name: Run execute worker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          agent-nightshift run-github-event \
            --repo "$GITHUB_WORKSPACE" \
            --commit \
            --push
