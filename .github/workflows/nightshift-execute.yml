name: nightshift-execute

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number that holds the plan"
        required: true
      push_ref:
        description: "Branch to execute on"
        required: true
      task:
        description: "Task key from .agent/project.yaml"
        required: true
        default: execute_plan
      time_budget_hours:
        description: "Soft time budget in hours"
        required: true
        default: "6"

jobs:
  execute:
    runs-on: self-hosted
    timeout-minutes: 480
    concurrency:
      group: nightshift-execute-${{ inputs.push_ref }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Persist dispatch context
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .nightshift-dispatch | Out-Null
          [ordered]@{
            issue_number      = '${{ inputs.issue_number }}'
            push_ref          = '${{ inputs.push_ref }}'
            task              = '${{ inputs.task }}'
            time_budget_hours = '${{ inputs.time_budget_hours }}'
          } | ConvertTo-Json -Compress | Set-Content .nightshift-dispatch/context.json -Encoding UTF8

      - name: Upload dispatch context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightshift-dispatch-context
          path: .nightshift-dispatch/context.json
          if-no-files-found: error

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.push_ref }}

      - name: Run execute worker
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MCP_GITHUB_TOKEN: ${{ github.token }}
        run: |
          export PATH="/c/Users/nonep/.local/bin:$PATH"
          git config --global core.longpaths true
          agent-nightshift run-github-event \
            --repo "$GITHUB_WORKSPACE" \
            --commit \
            --push
