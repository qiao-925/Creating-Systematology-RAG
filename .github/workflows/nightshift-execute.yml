name: nightshift-execute

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number that holds the plan"
        required: true
      push_ref:
        description: "Branch to execute on"
        required: true
      task:
        description: "Task key from .agent/project.yaml"
        required: true
        default: execute_plan
      time_budget_hours:
        description: "Soft time budget in hours"
        required: true
        default: "6"

jobs:
  execute:
    runs-on: self-hosted
    timeout-minutes: 480
    concurrency:
      group: nightshift-execute-${{ inputs.push_ref }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Persist dispatch context
        shell: bash
        env:
          CTX_ISSUE_NUMBER: ${{ inputs.issue_number }}
          CTX_PUSH_REF: ${{ inputs.push_ref }}
          CTX_TASK: ${{ inputs.task }}
          CTX_TIME_BUDGET_HOURS: ${{ inputs.time_budget_hours }}
        run: |
          mkdir -p .nightshift-dispatch
          python -c "
import json, os
json.dump({
    'issue_number': os.environ['CTX_ISSUE_NUMBER'],
    'push_ref': os.environ['CTX_PUSH_REF'],
    'task': os.environ['CTX_TASK'],
    'time_budget_hours': os.environ['CTX_TIME_BUDGET_HOURS'],
}, open('.nightshift-dispatch/context.json', 'w'))
"

      - name: Upload dispatch context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightshift-dispatch-context
          path: .nightshift-dispatch/context.json
          if-no-files-found: error

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.push_ref }}

      - name: Run execute worker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          agent-nightshift run-github-event \
            --repo "$GITHUB_WORKSPACE" \
            --commit \
            --push
