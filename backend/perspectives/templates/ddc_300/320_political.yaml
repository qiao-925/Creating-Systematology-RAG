# Political Analyst Template
# DDC 320: Political Science

id: "ddc_320_political"
name: "Political Analyst"
ddc_class: "320"
lcc_class: "JA-JC"
version: "1.0.0"

inheritance:
  from: "base/base_analyst.yaml"
  override_fields: 
    - "role_definition"
    - "extraction_preferences"
    - "search_strategy"

role_definition:
  title: "Political Analyst"
  description: "分析政策机制、政府行为、制度设计和政治动态对系统的影响"
  expertise_level: "expert"
  focus_areas:
    - policy_mechanisms          # 政策工具、执行机制
    - government_behavior        # 政府决策、官僚系统
    - institutional_design       # 制度安排、治理结构
    - political_dynamics         # 利益集团、选民行为
    - regulatory_frameworks      # 监管框架、合规要求
  
  output_format:
    causal_link_structure:
      - source: "str"
      - target: "str" 
      - polarity: "str"
      - weight: "float"
      - evidence: "str"
      - confidence: "float"
      - political_context: "str"  # 政治背景说明

extraction_preferences:
  causal_patterns:
    - pattern: "{policy} leads to {outcome}"
      weight: 0.9
    - pattern: "{government_action} causes {result}"
      weight: 0.85
    - pattern: "{regulation} drives {behavior}"
      weight: 0.8
    - pattern: "{institution} influences {decision}"
      weight: 0.75
  
  quantitative_indicators:
    - policy_adoption_rate       # 政策采纳率
    - implementation_timeline      # 实施时间线
    - regulatory_compliance_rate # 合规率
    - political_stability_index  # 政治稳定性
  
  source_preferences:
    tier_1:
      - "government_reports"     # 政府工作报告
      - "legislative_records"    # 立法记录
      - "policy_white_papers"    # 政策白皮书
    tier_2:
      - "think_tank_political"   # 智库政治分析
      - "academic_polisci"       # 政治学学术期刊
      - "cso_reports"            # 公民社会组织报告
  
  keywords:
    primary:
      - "policy"
      - "regulation"
      - "legislation"
      - "government"
      - "bureaucracy"
      - "governance"
    secondary:
      - "implementation"
      - "compliance"
      - "stakeholder"
      - "interest_group"
      - "electoral"
      - "institutional"

search_strategy:
  query_templates:
    - "{topic} policy analysis government"
    - "{topic} legislation regulation impact"
    - "{topic} political economy institutional"
  
  preferred_sources:
    - "congressional_research_service"
    - "government_accountability_office"
    - "white_house_policy_briefs"
    - "brookings_governance"
    - "urban_institute_policy"

metadata:
  created_at: "2026-04-12"
  optimized_for:
    - "tax_policy"
    - "housing_policy"
    - "healthcare_policy"
  evaluation_results:
    counterfactual:
      mean_contribution: null  # 待测试
      last_tested: null
    action_advancement:
      advancement_rate: null    # 待测试
      test_count: 0
      last_tested: null
    overall_pass: false
    can_deploy: false
